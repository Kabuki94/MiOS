# bib-configs/qcow2.toml - CloudWS-bootc v2.1.6
# Target: local libvirt/QEMU smoke-test of ghcr.io/kabuki94/cloudws-bootc:latest
# Generated by: quay.io/centos-bootc/bootc-image-builder --type qcow2

[[customizations.user]]
name     = "cloudws"
# Replace with: openssl passwd -6 'your-password'
password = "$6$REPLACEME_WITH_SHA512_HASH$REPLACEME"
# Replace with your real ssh-ed25519 public key
key      = "ssh-ed25519 AAAA_REPLACE_WITH_REAL_PUBKEY cloudws@operator"
groups   = ["wheel", "render", "video"]

[customizations.kernel]
append = "nvidia-drm.modeset=1 nvidia-drm.fbdev=1 rd.driver.blacklist=nouveau modprobe.blacklist=nouveau iommu=pt"

[[customizations.filesystem]]
mountpoint = "/"
minsize    = "150 GiB"

[[customizations.filesystem]]
mountpoint = "/var/home"
minsize    = "20 GiB"
