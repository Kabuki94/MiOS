# CloudWS-bootc SSSD base configuration.
# This file provides nss/pam defaults only.
# Realm-specific settings are written by /usr/libexec/cloudws/ipa-enroll
# into /etc/sssd/conf.d/20-cloudws-domain.conf at enrollment time.
#
# NOTE: sssd.conf itself is written by ipa-client-install.
# This drop-in is merged by libini and honoured since libini 1.3.0.
# Files in conf.d/ must be root:root 0600.

[nss]
filter_groups = root
filter_users = root
reconnection_retries = 3

[pam]
reconnection_retries = 3
pam_verbosity = 1
