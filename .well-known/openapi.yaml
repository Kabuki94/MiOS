openapi: 3.0.1
info:
  title: MiOS Deep Search Agent API
  description: API for the MiOS multi-agent deep research framework. Fully compatible with OpenAI standard chat completion endpoints.
  version: "1.0.0"
servers:
  - url: http://localhost:8501
    description: Local development server
paths:
  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      summary: Send a research request to the MiOS agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  example: mios_deep_search
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: object
                          properties:
                            role:
                              type: string
                            content:
                              type: string
