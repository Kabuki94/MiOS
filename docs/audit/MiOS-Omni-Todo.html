<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>To-Do List App</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f9f9fb; margin: 0; padding: 2rem;}
    .container { max-width: 400px; margin: auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px #0001; padding: 2rem;}
    h1 { text-align: center; color: #4545a8; }
    form { display: flex; margin-bottom: 1.5rem; }
    input[type="text"] {
      flex: 1; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px 0 0 4px; font-size: 1rem;
    }
    button {
      padding: 0 1.2rem; border: none; background: #4545a8; color: #fff; border-radius: 0 4px 4px 0;
      font-size: 1rem; cursor: pointer; transition: background .2s;
    }
    button:hover { background: #232366; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex; align-items: center; background: #f3f3fa; border-radius: 6px; margin-bottom: .5rem;
      padding: .7rem .8rem;
    }
    li.done { opacity: .5; text-decoration: line-through; }
    .delete { margin-left: auto; color: #d23; background: none; border: none; cursor: pointer; font-size: 1.1rem;}
    .delete:hover { color: #fff; background: #d23; border-radius: 50%; }
    input[type="checkbox"] { margin-right: 1rem; accent-color: #4545a8;}
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1>
    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="Enter a new task..." autocomplete="off" required />
      <button type="submit">Add</button>
    </form>
    <ul id="todo-list"></ul>
  </div>
  <script>
    const STORAGE_KEY = 'todolist-items';
    const input = document.getElementById('todo-input');
    const form = document.getElementById('todo-form');
    const list = document.getElementById('todo-list');

    // Load tasks from localStorage
    function loadTodos() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    // Save tasks to localStorage
    function saveTodos(todos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    // Render the To-Do list
    function render() {
      const todos = loadTodos();
      list.innerHTML = '';
      todos.forEach((todo, idx) => {
        const li = document.createElement('li');
        if (todo.done) li.classList.add('done');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = !!todo.done;
        checkbox.onchange = () => {
          todos[idx].done = checkbox.checked;
          saveTodos(todos);
          render();
        };

        const span = document.createElement('span');
        span.textContent = todo.text;

        const delBtn = document.createElement('button');
        delBtn.textContent = '✖';
        delBtn.className = 'delete';
        delBtn.onclick = () => {
          todos.splice(idx, 1);
          saveTodos(todos);
          render();
        };

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    // Handle new task submission
    form.onsubmit = e => {
      e.preventDefault();
      const text = input.value.trim();
      if (text) {
        const todos = loadTodos();
        todos.push({ text, done: false });
        saveTodos(todos);
        input.value = '';
        render();
      }
    };

    // Initial render on page load
    render();
  </script>
</body>
</html>
