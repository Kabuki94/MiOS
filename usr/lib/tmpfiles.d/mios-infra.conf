# MiOS -- Infrastructure & Virtualization runtime skeletons
# Ensures services starting before persistent /var is ready have necessary dirs.

# -- Cockpit ------------------------------------------------------------------
d /var/lib/cockpit            0775 root cockpit -
d /var/lib/cockpit/pstore     0775 root cockpit -

# -- Virtualization (Libvirt/QEMU/KVM) ----------------------------------------
d /var/lib/libvirt            0755 root root -
d /var/lib/libvirt/images     0755 root root -
d /var/lib/libvirt/qemu       0755 root root -
d /var/lib/libvirt/qemu/channel 0755 root root -
d /var/lib/libvirt/qemu/channel/target 0755 root root -
d /var/lib/libvirt/qemu/dump  0755 root root -
d /var/lib/libvirt/qemu/nvram 0755 root root -
d /var/lib/libvirt/qemu/save  0755 root root -
d /var/lib/libvirt/qemu/snapshot 0755 root root -
d /var/log/libvirt            0755 root root -
d /var/log/libvirt/qemu       0755 root root -
d /var/cache/libvirt          0755 root root -
d /var/cache/libvirt/qemu     0755 root root -

# -- Ceph ---------------------------------------------------------------------
d /var/lib/ceph               0750 root root -
d /var/log/ceph               0750 root root -
d /etc/ceph                   0755 root root -

# -- MiOS Component Skeletons ----------------------------------------------
d /etc/mios                0755 root root -
d /var/opt                    0755 root root -
d /var/home                   0755 root root -
d /var/tmp                    1777 root root -

# Unify mutable state to system-baked usr paths (USR-OVER-ETC pattern)
# These directories exist in /usr (read-only base) and are linked to /var (state)
d /usr/lib/mios/artifacts  0755 root root -
d /usr/lib/mios/backups    0700 root root -
d /usr/lib/mios/snapshots  0755 root root -
d /usr/lib/mios/logs       0755 root root -

# Runtime symlinks: bootc container lint requires /var to be managed via tmpfiles.d
d /var/lib/mios            0755 root root -
L+ /var/lib/mios/artifacts - - - - /usr/lib/mios/artifacts
L+ /var/lib/mios/backups   - - - - /usr/lib/mios/backups
L+ /var/lib/mios/snapshots - - - - /usr/lib/mios/snapshots
d /var/lib/mios/mcp        0755 mios mios -

d /var/lib/ollama          0755 root root -
L+ /var/lib/ollama/models  - - - - /usr/share/ollama/models

d /var/lib/alternatives    0755 root root -
d /var/lib/systemd/coredump 0755 root root -
d /var/lib/waydroid           0755 root root -
d /var/lib/waydroid/images    0755 root root -
d /var/lib/swtpm-localca      0755 root root -

# Log unification: link /var/log/mios to /usr/lib/mios/logs
d /var/log/mios            0755 root root -
L+ /var/log/mios/builds    - - - - /usr/lib/mios/logs
d /var/log/mios/mcp        0755 mios mios -
d /var/usrlocal               0755 root root -

# -- Containers & Cosign ------------------------------------------------------
d /etc/pki/containers         0755 root root -
d /etc/containers/registries.d 0755 root root -
d /etc/containers/registries.conf.d 0755 root root -

# -- Policy & Trust -----------------------------------------------------------
d /etc/fapolicyd/trust.d      0750 root fapolicyd -
d /var/lib/fapolicyd          0750 polkitd polkitd -

# -- Systemd Drop-ins ---------------------------------------------------------
d /usr/lib/systemd/system/polkit.service.d 0755 root root -
d /usr/lib/systemd/system/NetworkManager-wait-online.service.d 0755 root root -
