# MiOS-DEV Var Hygiene (v0.1.3)
# Satisfies bootc container lint by declaring mandatory /var state.
# These entries prevent "missing systemd tmpfiles.d entries" warnings.

# ── User Home ────────────────────────────────────────────────────────────────
d /var/home 0755 root root -
d /var/home/mios 0700 mios mios -
d /var/home/mios/.config 0700 mios mios -

# ── System Data ──────────────────────────────────────────────────────────────
d /var/lib/mios 0755 root root -
d /var/cache/libdnf5 0755 root root -

# ── SELinux Policy Store ─────────────────────────────────────────────────────
# semodule -i at build time populates /var/lib/selinux. 
# We declare the base directories here to align with bootc immutability patterns.
d /var/lib/selinux 0755 root root -
d /var/lib/selinux/targeted 0755 root root -
d /var/lib/selinux/targeted/active 0755 root root -
d /var/lib/selinux/targeted/active/modules 0755 root root -

# ── USRLOCAL Symlinks ────────────────────────────────────────────────────────
# ucore/bootc systems use /var/usrlocal for mutable /usr/local content.
d /var/usrlocal 0755 root root -
d /var/usrlocal/bin 0755 root root -
d /var/usrlocal/sbin 0755 root root -
L /var/usrlocal/bin/crictl - - - - /usr/local/bin/k3s
