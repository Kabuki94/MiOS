# CloudWS VDI reverse-proxy config, consumed by cloudws-vdi-nginx.container.
# Terminates TLS on :8443 (mapped to host :443 by the Quadlet).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8443 ssl http2;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/cloudws/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudws/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Apache Guacamole ---
    location /guacamole/ {
        proxy_pass http://guacamole:8080/guacamole/;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        # Pass IAP headers through to the header-auth extension.
        proxy_set_header X-Goog-Authenticated-User-Email $http_x_goog_authenticated_user_email;
        proxy_set_header X-Goog-IAP-JWT-Assertion        $http_x_goog_iap_jwt_assertion;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 1g;
        access_log off;
    }

    # --- KasmVNC direct ---
    location /kasmvnc/ {
        proxy_pass https://kasmvnc:6901/;
        proxy_ssl_verify off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # --- Cockpit loopback ---
    location /cockpit/ {
        proxy_pass https://127.0.0.1:9090/cockpit/;
        proxy_ssl_verify off;
        gzip off;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location = / {
        return 302 /guacamole/;
    }
}
