# CloudWS-bootc — Infrastructure & Virtualization runtime skeletons
# Ensures services starting before persistent /var is ready have necessary dirs.

# ── Cockpit ──────────────────────────────────────────────────────────────────
d /var/lib/cockpit            0775 root cockpit -
d /var/lib/cockpit/motd.d     0775 root cockpit -

# ── Libvirt / QEMU ──────────────────────────────────────────────────────────
d /var/lib/libvirt            0755 root root -
d /var/lib/libvirt/images     0755 root root -
d /var/lib/libvirt/qemu       0751 root root -
d /var/lib/libvirt/qemu/dump  0750 root root -
d /var/lib/libvirt/qemu/save  0750 root root -

# ── Logging Skeletons (v259+ journal compatibility) ─────────────────────────
d /var/log/journal            0755 root systemd-journal -

# ── CloudWS Component Skeletons ──────────────────────────────────────────────
d /var/opt                    0755 root root -
d /var/tmp                    1777 root root -
d /var/lib/waydroid           0755 root root -
