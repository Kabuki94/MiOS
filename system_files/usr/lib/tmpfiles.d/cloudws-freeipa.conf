# CloudWS v2.1.4 — FreeIPA/SSSD runtime directory skeletons
# ipa-client and certmonger expect these dirs at runtime.
# On immutable images, rpm postinst can't create them, so tmpfiles does it.

d /var/lib/certmonger          0755 root root -
d /var/lib/certmonger/requests 0755 root root -
d /var/lib/certmonger/cas      0755 root root -
d /var/lib/ipa-client          0755 root root -
d /var/lib/ipa-client/sysrestore 0755 root root -
d /var/lib/sss                 0755 root root -
d /var/lib/sss/db              0755 root root -
d /var/lib/sss/mc              0755 root root -
d /var/lib/sss/pipes           0755 root root -
d /var/lib/sss/pipes/private   0750 root root -
d /var/lib/sss/pubconf         0755 root root -