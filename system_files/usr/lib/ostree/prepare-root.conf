# CloudWS v1.3 — Composefs configuration
# bootc v1.11+ supports composefs-native backend.
# This enables verified boot filesystem with content-addressed dedup.
[composefs]
enabled = true

[etc]
# Transient /etc: changes to /etc don't persist across reboots
# unless explicitly written to /etc on the writable overlay.
# This is the recommended setting for maximum immutability.
# Set to false if you need persistent /etc changes without overlays.
transient = false
