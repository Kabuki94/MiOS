# CloudWS v2.1.4 — Static system user/group definitions
# Prevents UID/GID drift across image rebuilds.
# These override dynamic allocation so /var ownership stays stable.
#
# Format: u USER UID GROUP GECOS HOME SHELL
#         g GROUP GID

# CloudWS service accounts (stable IDs in 800-899 range)
g cloudws-virt 800 - -
u cloudws-virt 800:cloudws-virt "CloudWS Virtualization Service" /var/empty /usr/sbin/nologin