# CloudWS v2.1.1: Hyper-V driver modules for initramfs
# hv_storvsc is CRITICAL — without it, Hyper-V Gen2 VMs cannot detect their
# virtual disk and hang silently after kernel init.
# hyperv_keyboard provides pre-boot keyboard input.
# hyperv_drm provides the KMS framebuffer for Wayland compositing.
add_drivers+=" hv_vmbus hv_netvsc hv_storvsc hv_utils hv_balloon hv_sock "
add_drivers+=" hid-hyperv hyperv_keyboard hyperv_drm hyperv_fb "
