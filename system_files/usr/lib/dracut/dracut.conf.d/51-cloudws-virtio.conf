# CloudWS v2.1.1: Virtio + NVMe driver modules for initramfs
# Ensures QEMU/libvirt VMs and NVMe bare-metal systems can find root disk.
add_drivers+=" virtio_blk virtio_net virtio_scsi virtio_pci virtio_balloon "
add_drivers+=" virtio_console virtio_rng "
add_drivers+=" nvme nvme_core "
add_drivers+=" ahci sd_mod sr_mod "
