# CloudWS v2.1.1: Generate GENERIC initramfs for multi-surface deployment
# Without hostonly="no", dracut builds an initramfs tailored to the BUILD host's
# hardware. When deployed to Hyper-V, QEMU, or different bare metal, critical
# drivers (hv_storvsc, virtio_blk) are missing and the VM hangs at boot.
hostonly="no"
hostonly_cmdline="no"
