# CloudWS v1.3 — Kernel boot arguments
# Shipped via bootc kargs.d drop-in directory (bootc v1.11+)
# These survive atomic updates and don't require bootloader modification.
#
# IOMMU (required for VFIO GPU passthrough)
# Security hardening (adapted from SecureBlue)
# NVIDIA DRM (required for Wayland + Gamescope)

kargs = [
    "iommu=pt",
    "nvidia-drm.modeset=1",
    "nvidia-drm.fbdev=1",
    "slab_nomerge",
    "init_on_alloc=1",
    "page_alloc.shuffle=1",
    "randomize_kstack_offset=on",
    "pti=on",
    "vsyscall=none"
]
