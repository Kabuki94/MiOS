# CloudWS v2.1.4 — Kernel boot arguments
# Shipped via bootc kargs.d drop-in (bootc v1.11+)
#
# IOMMU (VFIO GPU passthrough)
# Security hardening (SecureBlue-derived)
# NVIDIA DRM (Wayland + Gamescope)
# Cgroup v2 unified (K3s kubelet requirement)

kargs = [
    "iommu=pt",
    "nvidia-drm.modeset=1",
    "nvidia-drm.fbdev=1",
    "systemd.unified_cgroup_hierarchy=1",
    "slab_nomerge",
    "init_on_alloc=1",
    "page_alloc.shuffle=1",
    "randomize_kstack_offset=on",
    "pti=on",
    "vsyscall=none"
]