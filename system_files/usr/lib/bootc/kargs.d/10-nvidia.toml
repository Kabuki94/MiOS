# NVIDIA kargs for CloudWS-bootc - applied by bootc; survive upgrades.
# Blacklist happens via /etc/modprobe.d/ at runtime if role is VM (no GPU).
match-architectures = ["x86_64"]
kargs = [
  "rd.driver.blacklist=nouveau",
  "modprobe.blacklist=nouveau",
  "nvidia.NVreg_PreserveVideoMemoryAllocations=1",
]
