[containers]
# Mandatory Access Control (MAC) Hardening
# Enforce strict SELinux labels for all Podman/Distrobox sandboxes.
# This confines container escapes to the container_t domain.
label = true

[engine]
# Global default for SELinux context in sandboxes
# This ensures K3s and Podman workloads share a hardened security posture.
# cloudws_sandbox_t is the target profile; falling back to container_t (upstream standard).
conmon_envvars = [
    "SELINUX_TYPE=container_t",
]
