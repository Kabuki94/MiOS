[containers]
# Mandatory Access Control (MAC) Hardening
# Enforce strict SELinux labels for all Podman/Distrobox sandboxes.
# This ensures K3s and Podman workloads share a hardened security posture.
# Falling back to container_t (upstream standard) until mios_sandbox_t is fully verified.
label = true
label_type = "container_t"

[engine]
# conmon_envvars removed (incorrect usage for SELinux)
