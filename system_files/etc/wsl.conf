# CloudWS WSL2 Configuration
# Enables systemd (required for Cockpit, K3s, Ceph services)
# Disables Windows PATH append (fixes "Failed to translate" spam)
[boot]
systemd=true

[interop]
enabled=true
appendWindowsPath=false

[network]
generateHosts=true
generateResolvConf=true

[user]
default=cloudws
