# Managed by CloudWS-bootc. Pins the cloud-init datasource to GCE and defers
# SSH-key management to google-guest-agent (AuthorizedKeysCommand).
datasource_list: [ GCE, None ]
datasource:
  GCE:
    retries: 5
    sec_between_retries: 1

# bootc: /usr is immutable; never run dnf at runtime.
package_update: false
package_upgrade: false
package_reboot_if_required: false

ssh_pwauth: false
disable_root: true
preserve_hostname: false

cloud_init_modules:
  - migrator
  - seed_random
  - bootcmd
  - write-files
  - growpart
  - resizefs
  - set_hostname
  - update_hostname
  - update_etc_hosts
  - users-groups
  - ssh

cloud_config_modules:
  - runcmd

cloud_final_modules:
  - scripts-user
  - ssh-authkey-fingerprints
  - final-message

# runcmd stanza is consumed from instance user-data; validate with:
#   cloud-init status --wait && cloud-init schema --system
