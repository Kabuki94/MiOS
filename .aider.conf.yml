# Aider configuration for MiOS
# https://aider.chat/specs/config/aider_conf.html

model:.ai/foundation-sonnet-4-6
edit-format: diff
auto-commits: false
dirty-commits: false

# Load project context at session start
read:
  - INDEX.md
  - .ai/foundation/memory/MEMORY.md

# Never auto-commit  changes need human review before pushing
# Use push-to-github.ps1 for releases

# Ignore generated/binary outputs
aiderignore: .aiderignore
