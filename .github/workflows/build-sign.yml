name: Build, sign, attest, push

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE_NAME: cloudws-bootc
  # Pin cosign to v2.6.x — do NOT upgrade to v3 until rpm-ostree#5509 is resolved.
  # Cosign v3 enables --new-bundle-format by default which bootc/rpm-ostree cannot verify.
  COSIGN_VERSION: "v2.6.0"

jobs:
  build-and-push:
    name: Build + push
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      full_ref: ${{ steps.reg.outputs.full_ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute lowercase registry path
        id: reg
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "registry=ghcr.io/${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "full_ref=ghcr.io/${OWNER_LC}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends podman buildah skopeo
          sudo loginctl enable-linger "$USER" || true

      - name: Free up runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
          sudo docker system prune -af || true
          df -h

      - name: Build image
        id: build
        run: |
          buildah bud \
            --jobs=2 \
            --layers=true \
            --file=Containerfile \
            --tag="localhost/${IMAGE_NAME}:${{ github.sha }}" \
            --tag="localhost/${IMAGE_NAME}:latest" \
            .

      - name: Log in to GHCR (buildah)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | buildah login \
            -u "${{ github.actor }}" \
            --password-stdin \
            ghcr.io

      - name: Log in to GHCR (cosign)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        id: push
        env:
          FULL_REF: ${{ steps.reg.outputs.full_ref }}
        run: |
          buildah push \
            --digestfile /tmp/digest.txt \
            "localhost/${IMAGE_NAME}:${{ github.sha }}" \
            "docker://${FULL_REF}:${{ github.sha }}"
          buildah push \
            "localhost/${IMAGE_NAME}:latest" \
            "docker://${FULL_REF}:latest"
          echo "digest=$(cat /tmp/digest.txt)" >> "$GITHUB_OUTPUT"

  sign:
    name: Sign (key-based + keyless)
    needs: build-and-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install cosign (pinned v2.6.x)
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign (key-based)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          FULL_REF: ${{ needs.build-and-push.outputs.full_ref }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
        run: |
          if [ -z "${COSIGN_PRIVATE_KEY}" ]; then
            echo "No signing secret provided, skipping key-based signing."
            exit 0
          fi
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            "${FULL_REF}@${DIGEST}"

      - name: Sign (keyless via Fulcio OIDC)
        env:
          FULL_REF: ${{ needs.build-and-push.outputs.full_ref }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
        run: |
          cosign sign --yes \
            "${FULL_REF}@${DIGEST}"

  sbom:
    name: SBOM (syft → oras attach)
    needs: build-and-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM (SPDX-JSON + CycloneDX)
        env:
          FULL_REF: ${{ needs.build-and-push.outputs.full_ref }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
        run: |
          syft "${FULL_REF}@${DIGEST}" \
            -o spdx-json=sbom.spdx.json \
            -o cyclonedx-json=sbom.cyclonedx.json

      - name: Attach SBOM via oras
        env:
          FULL_REF: ${{ needs.build-and-push.outputs.full_ref }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
        run: |
          oras attach --artifact-type application/vnd.cloudws.sbom.spdx+json \
            "${FULL_REF}@${DIGEST}" \
            sbom.spdx.json:application/vnd.cloudws.sbom.spdx+json
          oras attach --artifact-type application/vnd.cloudws.sbom.cyclonedx+json \
            "${FULL_REF}@${DIGEST}" \
            sbom.cyclonedx.json:application/vnd.cloudws.sbom.cyclonedx+json

  attest:
    name: Attest build provenance (SLSA)
    needs: build-and-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ needs.build-and-push.outputs.full_ref }}
          subject-digest: ${{ needs.build-and-push.outputs.digest }}
          push-to-registry: true

  ghcr-cleanup:
    name: GHCR cleanup (keep 7 untagged)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      packages: write

    steps:
      - name: Delete old untagged images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ env.IMAGE_NAME }}
          package-type: container
          min-versions-to-keep: 7
          delete-only-untagged-versions: true
          token: ${{ secrets.GITHUB_TOKEN }}
