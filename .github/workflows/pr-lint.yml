name: PR Lint
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck + Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (scripts/)
        uses: ludeeus/action-shellcheck@v2.0.0
        with:
          scandir: scripts/
          severity: warning

      - name: Hadolint (Containerfile)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Containerfile
          failure-threshold: error

      - name: Validate TOML syntax (kargs.d)
        run: |
          pip install toml
          for f in system_files/usr/lib/bootc/kargs.d/*.toml kargs.d/*.toml; do
            [ -f "$f" ] || continue
            echo "Checking $f"
            python3 -c '
          import toml, sys, textwrap
          code = """
          import toml, sys
          try:
              d = toml.load(sys.argv[1])
              for k, v in d.items():
                  if isinstance(v, dict):
                      print(f"ERROR: [{k}] section headers are invalid in bootc. Use flat kargs=[...] arrays.")
                      sys.exit(1)
                  if k not in ["kargs", "match-architectures"]:
                      print(f"ERROR: Invalid key \"{k}\". Only flat \"kargs\" and \"match-architectures\" are allowed.")
                      sys.exit(1)
          except Exception as e:
              print(f"ERROR: Invalid TOML syntax - {e}")
              sys.exit(1)
          """
          exec(textwrap.dedent(code))
          ' "$f" || exit 1
          done
          echo "All TOML files structurally valid for bootc"

      - name: Check for footgun packages in PACKAGES.md
        run: |
          FOOTGUNS="gnome-initial-setup gnome-tour PackageKit"
          for pkg in $FOOTGUNS; do
            if grep -qE "^${pkg}$" docs/PACKAGES.md; then
              echo "FOOTGUN: $pkg found in docs/PACKAGES.md"
              exit 1
            fi
          done
          echo "No footgun packages found"
