name: kargs-lint

on:
  pull_request:
    paths:
      - "kargs.d/**"
      - "overlay/usr/lib/bootc/kargs.d/**"
      - "automation/validate-kargs.py"
  push:
    branches: [main]
    paths:
      - "kargs.d/**"
      - "overlay/usr/lib/bootc/kargs.d/**"
      - "automation/validate-kargs.py"

permissions:
  contents: read

concurrency:
  group: kargs-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate kargs.d schema
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Validate kargs.d files
        run: |
          python3 automation/validate-kargs.py --github \
            kargs.d/ \
            overlay/usr/lib/bootc/kargs.d/
