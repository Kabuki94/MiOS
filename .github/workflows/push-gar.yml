name: push-gar
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:     ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  push:
    runs-on: ubuntu-24.04
    env:
      REGION: ${{ vars.GCP_REGION }}
      PROJECT: ${{ vars.GCP_PROJECT }}
      REPO:    ${{ vars.GCP_GAR_REPO }}
      IMAGE:   cloudws-bootc
      WIF:     ${{ vars.WIF_PROVIDER }}
      SA:      ${{ vars.WIF_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WIF }}
          service_account: ${{ env.SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Podman login to GAR
        run: |
          set -euo pipefail
          echo '${{ steps.auth.outputs.access_token }}' \
            | podman login -u oauth2accesstoken --password-stdin \
              "${REGION}-docker.pkg.dev"

      - name: Build image
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME//\//-}"
          podman build \
            -t "${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/${IMAGE}:${TAG}" \
            -t "${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/${IMAGE}:latest" .

      - name: Push
        id: push
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME//\//-}"
          podman push --digestfile=/tmp/digest \
            "${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/${IMAGE}:${TAG}"
          echo "digest=$(cat /tmp/digest)" >> "$GITHUB_OUTPUT"
          echo "ref=${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/${IMAGE}@$(cat /tmp/digest)" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3

      - name: Cosign keyless sign
        run: |
          set -euo pipefail
          cosign sign --yes "${{ steps.push.outputs.ref }}"
