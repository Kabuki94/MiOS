name: build-test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: kabuki94/cloudws-bootc
  IMAGE_BASE: ghcr.io/ublue-os/ucore-hci:stable-nvidia

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build-sign-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write   # required for Fulcio keyless OIDC exchange
      issues: write     # required for issue-on-failure
    steps:
      - name: Free runner disk
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Lowercase owner for registry
        id: owner
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "full_ref=ghcr.io/${OWNER_LC}/cloudws-bootc" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.10.1
        with:
          cosign-release: 'v2.6.3'

      - name: Log in to GHCR (for podman/buildah)
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (for cosign)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image with buildah
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: cloudws-bootc
          tags: latest ${{ github.sha }}
          containerfiles: ./Containerfile
          layers: true
          oci: true
          extra-args: |
            --jobs=4
            --network=host
            --build-arg=BASE_IMAGE=${{ env.IMAGE_BASE }}

      # NOTE: no `sudo`. buildah-build@v2 runs rootless, so the image lives
      # in the runner user's container storage, not root's. Dropped
      # --fatal-warnings because ucore-hci base emits two benign warnings
      # (core user sysusers.d, /var/cache/ldconfig/aux-cache). Dropped
      # `|| true` so real lint errors actually fail the build.
      - name: bootc container lint
        run: |
          podman run --rm --entrypoint /usr/bin/bootc \
            "${{ steps.build.outputs.image-with-tag }}" \
            container lint

      # NOTE: no `sudo`. Same reason — and the GHCR creds from
      # podman-login@v1 also live under $XDG_RUNTIME_DIR, which sudo
      # does not inherit.
      - name: Push image (capture digest)
        id: push
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMG="${{ steps.owner.outputs.full_ref }}"
          buildah push --digestfile=digest.txt \
            "${{ steps.build.outputs.image-with-tag }}" \
            "docker://${IMG}:latest"
          buildah push \
            "${{ steps.build.outputs.image-with-tag }}" \
            "docker://${IMG}:${GITHUB_SHA}"
          DIGEST="$(cat digest.txt)"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${IMG}"     >> "$GITHUB_OUTPUT"
          echo "Pushed ${IMG}@${DIGEST}"

      - name: Sign image with cosign (keyless, Fulcio OIDC)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE:  ${{ steps.push.outputs.image }}
        run: cosign sign --new-bundle-format=false --yes "${IMAGE}@${DIGEST}"

      - name: Verify signature (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE:  ${{ steps.push.outputs.image }}
        run: |
          cosign verify \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp="^https://github\.com/${GITHUB_REPOSITORY}/\.github/workflows/.+@refs/heads/main$" \
            "${IMAGE}@${DIGEST}"
