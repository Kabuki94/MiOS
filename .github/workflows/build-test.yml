name: build-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: kabuki94/cloudws-bootc
  IMAGE_BASE: ghcr.io/ublue-os/ucore-hci:stable-nvidia

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write
  id-token: write   # required for Fulcio keyless OIDC exchange

jobs:
  build:
    name: build-sign-push
    runs-on: ubuntu-24.04
    steps:
      - name: Free runner disk
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet \
                      /usr/local/lib/android /opt/ghc
          sudo docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Lowercase owner for registry
        id: owner
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "full_ref=ghcr.io/${OWNER_LC}/cloudws-bootc" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Log in to GHCR (for podman/buildah)
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (for cosign)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image with buildah
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: cloudws-bootc
          tags: latest ${{ github.sha }}
          containerfiles: ./Containerfile
          layers: true
          oci: true
          extra-args: |
            --jobs=2
            --build-arg=BASE_IMAGE=${{ env.IMAGE_BASE }}

      - name: bootc container lint
        run: |
          sudo podman run --rm --entrypoint /usr/bin/bootc \
            "${{ steps.build.outputs.image-with-tag }}" \
            container lint --fatal-warnings || true

      - name: Push image (capture digest)
        id: push
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMG="${{ steps.owner.outputs.full_ref }}"
          sudo buildah push --digestfile=digest.txt \
            "${{ steps.build.outputs.image-with-tag }}" \
            "docker://${IMG}:latest"
          sudo buildah push \
            "${{ steps.build.outputs.image-with-tag }}" \
            "docker://${IMG}:${GITHUB_SHA}"
          DIGEST="$(cat digest.txt)"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${IMG}"     >> "$GITHUB_OUTPUT"
          echo "Pushed ${IMG}@${DIGEST}"

      - name: Sign image with cosign (keyless, Fulcio OIDC)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE:  ${{ steps.push.outputs.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify signature (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE:  ${{ steps.push.outputs.image }}
        run: |
          cosign verify \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp="^https://github\.com/${GITHUB_REPOSITORY}/\.github/workflows/.+@refs/heads/main$" \
            "${IMAGE}@${DIGEST}"
